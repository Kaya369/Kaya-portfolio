<style>
:root{--bg:#fafaf8;--fg:#0e0e0e;--mid:#3a3a3a;--muted:#6a6a6a;--faint:#a8a8a8;--line:#e4e2dd;--line2:#ededea;--panel:#ffffff;
--serif:'DM Serif Display',serif;--sans:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;--disp:'Oswald',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:15.5px;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none;transition:opacity .15s}a:hover{opacity:.55}
.wrap{max-width:1180px;margin:0 auto;padding:0 40px}
/* HEADER */
header.site{position:sticky;top:0;z-index:50;background:rgba(250,250,248,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--line2)}
header .inner{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;max-width:1180px;margin:0 auto}
.mark{font-family:var(--mono);font-size:11px;letter-spacing:1.8px;text-transform:uppercase}
.mark b{font-weight:500}
nav ul{display:flex;gap:30px;list-style:none}
nav a{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding-bottom:3px;border-bottom:1px solid transparent}
nav a.on{color:var(--fg);border-color:var(--fg)}
@media(max-width:760px){nav ul{gap:16px}.mark{font-size:10px}header .inner{padding:14px 24px}.wrap{padding:0 24px}}
/* PAGE */
.page{display:none;padding:80px 0 100px;min-height:70vh}
.page.on{display:block}
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:2.4px;text-transform:uppercase;color:var(--muted);margin-bottom:18px;display:flex;gap:14px;align-items:center}
.eyebrow .dash{flex:0 0 40px;height:1px;background:var(--muted)}
h1.title{font-family:var(--serif);font-size:clamp(48px,7vw,92px);line-height:.98;letter-spacing:-1.2px;margin-bottom:28px}
h2.sub{font-family:var(--disp);font-weight:500;font-size:clamp(32px,4.5vw,52px);letter-spacing:.3px;text-transform:uppercase;line-height:1.02;margin-bottom:22px}
.lead{font-size:19px;line-height:1.55;color:var(--mid);max-width:760px;margin-bottom:40px}
.lead b{color:var(--fg);font-weight:600}
/* HOME HERO */
.hero-meta{display:grid;grid-template-columns:1.4fr 1fr;gap:60px;align-items:end;margin-bottom:40px}
.hero-meta .tag{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:18px;display:flex;gap:12px;align-items:center}
.hero-meta .sq{width:8px;height:8px;background:var(--fg)}
.hero-meta .sub{font-size:18px;max-width:560px;color:var(--mid)}
.hero-meta .sub b{color:var(--fg);font-weight:600}
.sidecol{font-family:var(--mono);font-size:10.5px;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);display:grid;gap:9px}
.sidecol .row{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:7px}
.sidecol .row b{color:var(--fg);font-weight:500}
@media(max-width:800px){.hero-meta{grid-template-columns:1fr;gap:30px}}
#hero-3d{width:100%;height:340px;border:1px solid var(--line);position:relative;overflow:hidden;background:var(--panel)}
#three-canvas{position:absolute;inset:0;width:100%;height:100%}
.three-tag{position:absolute;top:14px;left:18px;font-family:var(--mono);font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--muted);z-index:2}
.three-tag b{color:var(--fg);font-weight:500}
/* ROLE CARD (work page) */
.role{border-top:1px solid var(--line);padding:50px 0}
.role:last-child{border-bottom:1px solid var(--line)}
.role-head{display:grid;grid-template-columns:200px 1fr 140px;gap:30px;align-items:start;margin-bottom:22px}
.role-head .dt{font-family:var(--mono);font-size:11px;letter-spacing:1.2px;color:var(--muted);padding-top:6px}
.role-head .role-title{font-family:var(--disp);font-size:30px;font-weight:500;letter-spacing:.3px;text-transform:uppercase;line-height:1.04;margin-bottom:6px}
.role-head .org{font-family:var(--mono);font-size:11px;letter-spacing:1.3px;color:var(--mid);text-transform:uppercase;margin-bottom:14px}
.role-head p{font-size:15.5px;color:var(--mid);line-height:1.55;max-width:640px}
.role-head .status{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-align:right;padding-top:8px}
.role-head .status.live{color:#2a8a3e}
/* Per-role metrics strip */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0;border:1px solid var(--line);margin-top:22px;margin-left:230px;background:var(--panel)}
.metric{padding:18px 20px;border-right:1px solid var(--line)}
.metric:last-child{border-right:none}
.metric .n{font-family:var(--serif);font-size:28px;line-height:1;margin-bottom:6px}
.metric .l{font-family:var(--mono);font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}
.metric .d{font-size:12px;color:var(--mid);margin-top:6px;line-height:1.4}
.phases{margin-top:18px;margin-left:230px;display:grid;gap:1px;background:var(--line);border:1px solid var(--line)}
.phase-row{background:var(--panel);padding:16px 18px}
.phase-row .h{font-family:var(--mono);font-size:10.5px;letter-spacing:1.3px;color:var(--fg);text-transform:uppercase;margin-bottom:6px}
.phase-row .h span{color:var(--muted);margin-right:14px}
.phase-row .d{font-size:13.5px;color:var(--mid);line-height:1.5}
@media(max-width:800px){.role-head{grid-template-columns:1fr;gap:8px}.role-head .status{text-align:left}.metrics,.phases{margin-left:0}}
/* LETTERS PAGE */
.letter-card{border:1px solid var(--line);background:var(--panel);padding:40px;margin-bottom:20px}
.letter-card .lh{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:22px;flex-wrap:wrap;gap:14px}
.letter-card .lh .who{font-family:var(--disp);font-size:22px;letter-spacing:.3px;text-transform:uppercase}
.letter-card .lh .what{font-family:var(--mono);font-size:10.5px;letter-spacing:1.3px;color:var(--muted);text-transform:uppercase}
.letter-card blockquote{font-family:var(--serif);font-size:22px;line-height:1.45;margin-bottom:22px;color:var(--fg)}
.letter-card .foot{font-family:var(--mono);font-size:10.5px;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
.letter-card .foot a{color:var(--fg);border-bottom:1px solid var(--fg);padding-bottom:2px}
/* WORK/PROJECTS PAGE (uploads) */
.project-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:30px}
.project{border:1px solid var(--line);background:var(--panel);padding:28px;display:flex;flex-direction:column;gap:12px;min-height:240px;transition:border-color .15s}
.project:hover{border-color:var(--fg)}
.project .pt{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
.project h3{font-family:var(--disp);font-size:26px;font-weight:500;letter-spacing:.3px;text-transform:uppercase;line-height:1.05}
.project p{font-size:14.5px;color:var(--mid);line-height:1.55;flex:1}
.project .tags{display:flex;flex-wrap:wrap;gap:6px}
.project .tag{font-family:var(--mono);font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;padding:5px 9px;border:1px solid var(--line);color:var(--muted)}
.project .cta{font-family:var(--mono);font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;padding-top:10px;border-top:1px solid var(--line);color:var(--fg);display:flex;justify-content:space-between}
.project .placeholder{font-family:var(--mono);font-size:10px;color:var(--faint);font-style:italic}
@media(max-width:700px){.project-grid{grid-template-columns:1fr}}
/* ABOUT */
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:40px}
@media(max-width:720px){.cols2{grid-template-columns:1fr}}
.cols2 p{color:var(--mid);line-height:1.6;margin-bottom:14px}
.cols2 p b{color:var(--fg);font-weight:600}
.cols2 h3{font-family:var(--mono);font-size:10px;letter-spacing:1.8px;color:var(--muted);text-transform:uppercase;margin-bottom:14px}
.books{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--line);margin-top:40px}
.book{padding:22px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);min-height:180px;background:var(--panel)}
.book:nth-child(3n){border-right:none}.book:nth-last-child(-n+3){border-bottom:none}
.book .t{font-family:var(--serif);font-size:18px;line-height:1.2;margin-bottom:6px}
.book .a{font-family:var(--mono);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.book .p{font-size:13px;color:var(--mid);line-height:1.55}
@media(max-width:860px){.books{grid-template-columns:1fr 1fr}.book:nth-child(3n){border-right:1px solid var(--line)}.book:nth-child(2n){border-right:none}}
@media(max-width:560px){.books{grid-template-columns:1fr}.book{border-right:none!important}}
/* CONTACT */
.cblock{display:grid;grid-template-columns:1.3fr 1fr;gap:60px;align-items:end;margin-top:30px}
.email{font-family:var(--serif);font-size:clamp(30px,4.5vw,56px);line-height:1;letter-spacing:-.5px}
.email a{border-bottom:1px solid var(--fg);padding-bottom:5px}
.cmeta{font-family:var(--mono);font-size:11px;letter-spacing:1.3px;color:var(--muted);text-transform:uppercase;display:grid;gap:9px}
.cmeta .row{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:7px}
.cmeta .row b{color:var(--fg);font-weight:500}
.cmeta a b{color:var(--fg)}
@media(max-width:800px){.cblock{grid-template-columns:1fr}}
footer{padding:34px 0;border-top:1px solid var(--line2);font-family:var(--mono);font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin-top:60px}
footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:16px}
</style>
</head>

}

function setNav(route){
  document.querySelectorAll('nav a').forEach(a=>a.classList.toggle('on',a.dataset.route===route));
}

function go(){
  const hash=location.hash.replace('#/','')||'home';
  const route=routes[hash]?hash:'home';
  app.innerHTML=routes[route]();
  setNav(route);
  window.scrollTo(0,0);
  if(route==='home')mount3D();
}
window.addEventListener('hashchange',go);

/* 3D hero */
function mount3D(){
  const canvas=document.getElementById('three-canvas');
  if(!canvas||typeof THREE==='undefined')return;
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(45,canvas.clientWidth/canvas.clientHeight,0.1,1000);
  camera.position.set(0,0,8.5);
  const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  function rs(){renderer.setSize(canvas.clientWidth,canvas.clientHeight,false);camera.aspect=canvas.clientWidth/canvas.clientHeight;camera.updateProjectionMatrix()}
  rs();addEventListener('resize',rs);
  const geo=new THREE.IcosahedronGeometry(2.4,2);
  const mat=new THREE.MeshBasicMaterial({color:0x111111,wireframe:true,transparent:true,opacity:0.28});
  const mesh=new THREE.Mesh(geo,mat);scene.add(mesh);
  const pos=geo.attributes.position;const seen=new Set();const uniq=[];
  for(let i=0;i<pos.count;i++){const v=new THREE.Vector3().fromBufferAttribute(pos,i);const k=v.x.toFixed(2)+v.y.toFixed(2)+v.z.toFixed(2);if(!seen.has(k)){seen.add(k);uniq.push(v)}}
  const dg=new THREE.SphereGeometry(0.03,8,8),dm=new THREE.MeshBasicMaterial({color:0x0e0e0e});
  uniq.forEach(v=>{const m=new THREE.Mesh(dg,dm);m.position.copy(v);scene.add(m)});
  const lm=new THREE.LineBasicMaterial({color:0x111111,transparent:true,opacity:0.2});
  for(let i=0;i<uniq.length;i++)for(let j=i+1;j<uniq.length;j++)if(uniq[i].distanceTo(uniq[j])<1.6){
    const g=new THREE.BufferGeometry().setFromPoints([uniq[i],uniq[j]]);scene.add(new THREE.Line(g,lm));
  }
  let mx=0,my=0,tmx=0,tmy=0;
  canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();tmx=((e.clientX-r.left)/r.width-0.5)*0.8;tmy=((e.clientY-r.top)/r.height-0.5)*0.5});
  (function loop(){requestAnimationFrame(loop);mx+=(tmx-mx)*0.06;my+=(tmy-my)*0.06;mesh.rotation.y+=0.0022+mx*0.004;mesh.rotation.x+=0.0009+my*0.004;renderer.render(scene,camera)})();
}

go();
</script>
